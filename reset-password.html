<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Réinitialisation du mot de passe — Bailo Patrimoine</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #0f1117; color: #e8eaf0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card { background: #161820; border: 0.5px solid #2a2d3a; border-radius: 16px; padding: 40px; width: 380px; }
.logo { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.logo span { color: #6c63ff; }
.sub { font-size: 13px; color: #6b7280; margin-bottom: 28px; }
label { font-size: 12px; color: #9ca3af; display: block; margin-bottom: 6px; }
input { width: 100%; background: #1e2030; border: 0.5px solid #2a2d3a; border-radius: 8px; padding: 10px 12px; color: #e8eaf0; font-size: 14px; margin-bottom: 14px; }
input:focus { outline: none; border-color: #6c63ff; }
.btn { width: 100%; background: #6c63ff; color: #fff; border: none; border-radius: 8px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn:disabled { opacity: .6; cursor: not-allowed; }
.error { font-size: 13px; color: #f87171; margin-top: 10px; }
.success { font-size: 13px; color: #34d399; margin-top: 10px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Bailo <span>Patrimoine</span></div>
  <div class="sub">Définissez votre nouveau mot de passe</div>
  <label>Nouveau mot de passe</label>
  <input type="password" id="new-password" placeholder="8 caractères minimum">
  <label>Confirmer le mot de passe</label>
  <input type="password" id="confirm-password" placeholder="Répétez le mot de passe">
  <button class="btn" id="btn-reset" onclick="handleReset()">Enregistrer le nouveau mot de passe</button>
  <div id="error-msg" class="error" style="display:none"></div>
  <div id="success-msg" class="success" style="display:none"></div>
</div>

<script>
const SUPABASE_URL = 'https://hvkguyddmhqbvarujlyr.supabase.co';
const SUPABASE_KEY = 'sb_publishable_BZHU49hkN70MgEypJZ7K5A_AwlIQF7W';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Supabase gère automatiquement le token depuis l'URL hash
db.auth.onAuthStateChange(async (event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    console.log('Mode réinitialisation actif');
  }
});

async function handleReset() {
  const password = document.getElementById('new-password').value;
  const confirm = document.getElementById('confirm-password').value;
  const errorEl = document.getElementById('error-msg');
  const successEl = document.getElementById('success-msg');
  const btn = document.getElementById('btn-reset');

  errorEl.style.display = 'none';
  successEl.style.display = 'none';

  if (password.length < 8) {
    errorEl.textContent = 'Le mot de passe doit contenir au moins 8 caractères.';
    errorEl.style.display = 'block';
    return;
  }
  if (password !== confirm) {
    errorEl.textContent = 'Les mots de passe ne correspondent pas.';
    errorEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Enregistrement…';

  const { error } = await db.auth.updateUser({ password });

  if (error) {
    errorEl.textContent = 'Erreur : ' + error.message;
    errorEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Enregistrer le nouveau mot de passe';
  } else {
    successEl.textContent = 'Mot de passe mis à jour ! Redirection vers Bailo Patrimoine…';
    successEl.style.display = 'block';
    btn.textContent = 'Mot de passe enregistré ✓';
    setTimeout(() => window.location.href = 'https://patrimoine.bailo.pro', 2500);
  }
}
</script>
</body>
</html>
